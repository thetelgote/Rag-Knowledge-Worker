name: RAG App CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gradio langchain langchain-community \
        langchain-core langchain-text-splitters \
        langchain-huggingface faiss-cpu \
        sentence-transformers python-docx pypdf python-dotenv

    # 4. Lint (optional but good)
    - name: Run lint check
      run: |
        pip install flake8
        flake8 . || true

    # 5. Test import (basic check)
    - name: Run basic test
      run: |
        python -c "import app; print('App loaded successfully')"

    # 6. (Optional) Run ingest
    - name: Run ingestion
      run: |
        python ingestion/ingest.py || true

    # 7. Success message
    - name: Done
      run: echo "CI/CD pipeline executed successfully"